# ═══════════════════════════════════════════════════════════════
#  Ursus Insight SIEM — Nginx reverse-proxy config
#
#  Установка:
#    sudo cp nginx_ursus.conf /etc/nginx/sites-available/ursus
#    sudo ln -s /etc/nginx/sites-available/ursus /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  HTTPS (Let's Encrypt):
#    sudo apt install certbot python3-certbot-nginx
#    sudo certbot --nginx -d your-domain.com
# ═══════════════════════════════════════════════════════════════

# Ограничение числа запросов (защита от брутфорса)
limit_req_zone $binary_remote_addr zone=ursus_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=ursus_api:10m   rate=60r/m;

# ── HTTP → HTTPS редирект ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;   # <-- замените на свой домен или IP

    # Для Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (основной блок) ────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;   # <-- замените на свой домен или IP

    # SSL-сертификаты (certbot заполнит автоматически)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Современные TLS-настройки
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:CHACHA20;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Логи
    access_log /var/log/nginx/ursus_access.log;
    error_log  /var/log/nginx/ursus_error.log;

    # Статические файлы — отдаёт nginx напрямую (быстрее)
    location /static/ {
        alias /opt/ursus/web/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Ограничение брутфорса логина
    location /login {
        limit_req zone=ursus_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }

    # API — ограничение частоты запросов
    location /api/ {
        limit_req zone=ursus_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }

    # Всё остальное → Flask
    location / {
        proxy_pass http://127.0.0.1:8080;
        include /etc/nginx/proxy_params;
    }
}
