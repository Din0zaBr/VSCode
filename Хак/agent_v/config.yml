agent:
  hostname: null  # auto-detect из os.uname()
  log_level: INFO
  state_dir: /var/lib/log-agent

inputs:
  files:
    # Ubuntu / Kali / Astra Linux
    - /var/log/syslog
    - /var/log/auth.log
    - /var/log/kern.log
    - /var/log/daemon.log
    # RED OS / CentOS (агент пропустит несуществующие)
    - /var/log/messages
    - /var/log/secure
  journald: true
  poll_interval: 1.0  # секунды

buffer:
  max_size_mb: 512

output:
  host: https://opensearch:9200
  user: admin
  password: admin  # переопределяется через OPENSEARCH_PASSWORD
  index_prefix: logs
  verify_ssl: false
  batch_size: 200
  flush_interval: 5.0
