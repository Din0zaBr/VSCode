<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D1A;font-family:'Share Tech Mono',monospace;padding:24px;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
.card{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.box{width:120px;height:56px;background:#16162A;border-radius:6px;border:1px solid #2A2A4A;display:flex;align-items:center;justify-content:center}
.name{font-size:9px;color:#7A7A9A;letter-spacing:1.5px;text-transform:uppercase}
.desc{font-size:8px;color:#BF40BF}
</style>
</head>
<body>
<div class="card">
  <div class="box" style="box-shadow:4px 0 24px rgba(106,13,173,0.15)"><span style="font-size:9px;color:#BF40BF">sidebar</span></div>
  <div class="name">panel shadow</div>
  <div class="desc">rgba(106,13,173,0.15)</div>
</div>
<div class="card">
  <div class="box" style="box-shadow:0 0 40px rgba(106,13,173,0.3);border-color:#6A0DAD"><span style="font-size:9px;color:#BF40BF">modal</span></div>
  <div class="name">modal glow</div>
  <div class="desc">rgba(106,13,173,0.3)</div>
</div>
<div class="card">
  <div class="box" style="box-shadow:0 0 10px rgba(191,64,191,0.6)"><span style="font-size:9px;color:#BF40BF;text-shadow:0 0 8px #BF40BF">URSUS</span></div>
  <div class="name">accent glow</div>
  <div class="desc">rgba(191,64,191,0.6)</div>
</div>
<div class="card">
  <div class="box" style="box-shadow:0 0 8px rgba(255,49,49,0.5);border-color:rgba(255,49,49,0.4)"><span style="font-size:9px;color:#FF3131;text-shadow:0 0 6px #FF3131">CRITICAL</span></div>
  <div class="name">critical glow</div>
  <div class="desc">rgba(255,49,49,0.5)</div>
</div>
<div class="card">
  <div class="box" style="box-shadow:0 0 6px rgba(57,255,20,0.6);border-color:rgba(57,255,20,0.4)"><span style="font-size:9px;color:#39FF14;text-shadow:0 0 6px #39FF14">ONLINE</span></div>
  <div class="name">success glow</div>
  <div class="desc">rgba(57,255,20,0.6)</div>
</div>
<div class="card">
  <div class="box" style="background:rgba(22,22,42,0.65);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 32px rgba(0,0,0,0.45),0 0 0 1px rgba(106,13,173,0.15)"><span style="font-size:9px;color:rgba(255,255,255,0.7)">liquid glass</span></div>
  <div class="name">glass shadow</div>
  <div class="desc">blur(14px) + rgba</div>
</div>
</body>
</html>
