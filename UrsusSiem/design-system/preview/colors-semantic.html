<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D1A;font-family:'Share Tech Mono',monospace;padding:20px;display:flex;flex-direction:column;gap:10px}
.row{display:flex;gap:24px;align-items:center}
.swatch{width:28px;height:28px;border-radius:4px;flex-shrink:0}
.token{font-size:10px;color:#BF40BF;width:160px;letter-spacing:1px}
.desc{font-size:11px;color:#D4D4E8;flex:1}
.example{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div class="row"><div class="swatch" style="background:#D4D4E8"></div><div class="token">--color-text</div><div class="desc">Body copy · <span style="color:#D4D4E8" class="example">Система активна</span></div></div>
<div class="row"><div class="swatch" style="background:#7A7A9A"></div><div class="token">--color-text-dim</div><div class="desc">Labels, meta · <span style="color:#7A7A9A" class="example">LOCAL TIME</span></div></div>
<div class="row"><div class="swatch" style="background:#EEEEFF"></div><div class="token">--color-text-bright</div><div class="desc">Headings, values · <span style="color:#EEEEFF" class="example">DASHBOARD</span></div></div>
<div class="row"><div class="swatch" style="background:#2A2A4A;border:1px solid #4A4A6A"></div><div class="token">--color-border</div><div class="desc">Default borders</div></div>
<div class="row"><div class="swatch" style="background:rgba(106,13,173,0.27);border:1px solid rgba(106,13,173,0.4)"></div><div class="token">--color-border2</div><div class="desc">Hover/active borders</div></div>
<div class="row"><div class="swatch" style="background:rgba(22,22,42,0.65);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(14px)"></div><div class="token">--glass-bg</div><div class="desc">Liquid glass panels</div></div>
<div class="row"><div class="swatch" style="background:#00BFFF;border-radius:50%"></div><div class="token">ip-tag</div><div class="desc">IP address chips · <span style="color:#00BFFF;background:rgba(0,191,255,0.1);border:1px solid rgba(0,191,255,0.3);padding:1px 6px;border-radius:3px;font-size:10px">192.168.1.1</span></div></div>
</body>
</html>
