<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070710;font-family:'Share Tech Mono',monospace;padding:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
.swatch{width:100px}
.color-block{height:60px;border-radius:6px;margin-bottom:7px;border:1px solid #2A2A4A;display:flex;align-items:flex-end;padding:5px 7px}
.hex{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:1px}
.label{font-size:9px;color:#7A7A9A;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.name{font-size:10px;color:#D4D4E8}
</style>
</head>
<body>
<div class="swatch">
  <div class="color-block" style="background:#070710"><span class="hex">#070710</span></div>
  <div class="label">bg-void</div><div class="name">Void</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#0D0D1A"><span class="hex">#0D0D1A</span></div>
  <div class="label">bg-deep</div><div class="name">Deep</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#111122"><span class="hex">#111122</span></div>
  <div class="label">bg</div><div class="name">Base</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#16162A"><span class="hex">#16162A</span></div>
  <div class="label">bg2</div><div class="name">Panel</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#1E1E36"><span class="hex">#1E1E36</span></div>
  <div class="label">bg3</div><div class="name">Header</div>
</div>
<div class="swatch">
  <div class="color-block" style="background:#252542"><span class="hex">#252542</span></div>
  <div class="label">bg4</div><div class="name">Elevated</div>
</div>
</body>
</html>
