<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D1A;padding:24px;display:flex;align-items:flex-start;justify-content:center}
.modal{background:#16162A;border:1px solid #6A0DAD;border-radius:8px;padding:22px;width:340px;box-shadow:0 0 40px rgba(106,13,173,0.3);position:relative}
.modal-title{font-family:'Orbitron',monospace;font-size:12px;color:#BF40BF;letter-spacing:2px;margin-bottom:14px;border-bottom:1px solid #2A2A4A;padding-bottom:8px;text-transform:uppercase}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:#7A7A9A;font-size:16px;cursor:pointer}
.form-label{display:block;font-family:'Share Tech Mono',monospace;font-size:9px;color:#7A7A9A;letter-spacing:1px;margin-bottom:5px;text-transform:uppercase}
.form-group{margin-bottom:12px}
.form-control{width:100%;background:#1E1E36;border:1px solid #2A2A4A;border-radius:6px;color:#D4D4E8;font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 10px;outline:none}
.row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1px solid #2A2A4A;background:#1E1E36;color:#D4D4E8;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer}
.btn-primary{border-color:#6A0DAD;color:#BF40BF;background:rgba(106,13,173,0.2)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sev{display:inline-block;padding:2px 8px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:bold;letter-spacing:1px}
</style>
</head>
<body>
<div class="modal">
  <div class="modal-title">⚡ ДЕТАЛИ ИНЦИДЕНТА</div>
  <button class="modal-close">✕</button>
  <div class="grid">
    <div><label class="form-label">Severity</label><span class="sev" style="background:rgba(255,49,49,0.13);color:#FF3131;border:1px solid rgba(255,49,49,0.4)">CRITICAL</span></div>
    <div><label class="form-label">Статус</label><span class="sev" style="background:rgba(255,49,49,0.13);color:#FF3131;border:1px solid rgba(255,49,49,0.27)">OPEN</span></div>
  </div>
  <div class="form-group">
    <label class="form-label">Правило</label>
    <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#D4D4E8">SSH Brute Force Detection</div>
  </div>
  <div class="form-group">
    <label class="form-label">Заметки</label>
    <textarea class="form-control" rows="2" placeholder="Добавить заметки..."></textarea>
  </div>
  <div class="row">
    <button class="btn">Отмена</button>
    <button class="btn btn-primary">✓ Закрыть</button>
  </div>
</div>
</body>
</html>
