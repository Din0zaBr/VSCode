title: SQL Injection Attempt
id: web-sqli-001
status: stable
description: Detects SQL injection patterns in web application logs.
author: URSUS SIEM
date: 2024-01-01
category: web_attacks
severity: high
tags:
  - attack.initial_access
  - attack.t1190
logsource:
  category: webserver
detection:
  selection:
    message|contains|any:
      - "' OR '1'='1"
      - "' OR 1=1"
      - "UNION SELECT"
      - "UNION ALL SELECT"
      - "' AND SLEEP("
      - "'; DROP TABLE"
      - "xp_cmdshell"
      - "information_schema"
      - "1' AND '1'='1"
  condition: selection
fields:
  - src.ip
  - message
  - host
  - action
falsepositives:
  - Security testing tools (pen tests)
  - WAF testing
level: high
