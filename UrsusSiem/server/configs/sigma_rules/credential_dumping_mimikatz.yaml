title: Credential Dumping - Mimikatz Indicators
id: cred-mimi-001
status: stable
description: Detects Mimikatz credential dumping tool usage via process arguments and known patterns.
author: URSUS SIEM
date: 2024-01-01
category: credential_access
severity: critical
tags:
  - attack.credential_access
  - attack.t1003
logsource:
  category: process_creation
detection:
  selection:
    message|contains|any:
      - "sekurlsa::logonpasswords"
      - "lsadump::sam"
      - "lsadump::dcsync"
      - "privilege::debug"
      - "mimikatz"
      - "mimilib"
      - "procdump -ma lsass"
      - "rundll32 C:\\windows\\System32\\comsvcs.dll"
  condition: selection
fields:
  - object.name
  - message
  - host
  - subject.name
falsepositives:
  - Security research environments
  - Authorized red team engagements
level: critical
