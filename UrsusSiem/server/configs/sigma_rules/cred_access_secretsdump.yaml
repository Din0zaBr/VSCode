title: Credential Access - Impacket Secretsdump Execution
id: cred-acc-002
status: stable
description: Detects Impacket secretsdump tool indicators in process arguments used for remote credential extraction from SAM, LSA, and NTDS
author: URSUS SIEM
date: 2024-01-01
category: credential_access
severity: critical
tags:
  - attack.credential_access
  - attack.t1003.002
logsource:
  category: process_creation
  service: syslog
detection:
  selection:
    message|contains|any:
      - "secretsdump"
      - "impacket"
      - "HKLM\\SAM"
      - "HKLM\\SECURITY"
      - "HKLM\\SYSTEM"
      - "ntds.dit"
      - "drsuapi"
      - "DRSGetNCChanges"
      - "smbexec.py"
  condition: selection
fields:
  - src.ip
  - host
  - message
  - subject.name
  - object.path
  - action
falsepositives:
  - Authorized penetration testing
  - Legitimate backup operations using similar tools
level: critical
