title: Credential Access - Password Spray Attack
id: cred-acc-001
status: stable
description: Detects password spray attacks where an attacker tries a single or few passwords against many accounts to avoid lockout
author: URSUS SIEM
date: 2024-01-01
category: credential_access
severity: high
tags:
  - attack.credential_access
  - attack.t1110.003
logsource:
  category: authentication
  service: windows_security
detection:
  selection:
    status|contains|any:
      - "failure"
      - "failed"
      - "invalid"
      - "0xC000006A"
      - "0xC0000064"
    message|contains|any:
      - "Logon Failure"
      - "Account lockout"
      - "Password incorrect"
  condition: selection
fields:
  - src.ip
  - subject.name
  - host
  - status
  - message
  - action
falsepositives:
  - Legitimate users forgetting passwords
  - Misconfigured service accounts
level: high
