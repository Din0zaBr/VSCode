title: C2 Beaconing - Regular Interval Outbound Connections
id: c2-net-001
status: stable
description: Detects regular interval outbound connections that may indicate Command and Control beaconing behavior
author: URSUS SIEM
date: 2024-01-01
category: command_and_control
severity: high
tags:
  - attack.command_and_control
  - attack.t1071
logsource:
  category: network
  service: syslog
detection:
  selection:
    action|contains|any:
      - "CONNECT"
      - "outbound"
      - "established"
    count.bytes|contains|any:
      - "beacon"
      - "periodic"
  condition: selection
fields:
  - src.ip
  - dst.ip
  - dst.port
  - protocol
  - count.bytes
  - action
falsepositives:
  - Legitimate software with regular update checks
  - Heartbeat monitoring agents
level: high
