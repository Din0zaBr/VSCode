# Docker Compose overlay for Pro tier (Sprint 10+).
# Adds the logvault-llm container. Run with:
#   docker compose -f docker-compose.yml -f docker-compose.pro.yml --profile ai up -d

services:
  logvault-llm:
    build: ./logvault-llm
    restart: unless-stopped
    environment:
      URSUS_LLM_MODEL: /models/vikhr-7b-instruct.gguf
      URSUS_LLM_N_CTX: "4096"
      URSUS_LLM_GPU_LAYERS: "${URSUS_LLM_GPU_LAYERS:-0}"
    volumes:
      - ${URSUS_LLM_MODELS_DIR:-./models}:/models:ro
    ports:
      - "8001:8000"
    profiles:
      - ai
    deploy:
      resources:
        limits:
          memory: 12g
