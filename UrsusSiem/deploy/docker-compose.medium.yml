# S/M tier overlay — adds ClickHouse for hot log storage.
#
# Run from the repo root:
#   docker compose -f deploy/docker-compose.yml \
#                  -f deploy/docker-compose.medium.yml up -d
#
# What it adds:
#   * ClickHouse (single node) — replaces Postgres for the logs hot path
#   * URSUS_STORAGE=clickhouse in gateway
#
# Postgres still runs for metadata (users, rules, scenarios, audit_log).
# Backfill old logs PG → CH with tools/pg-to-ch.py (see PLAN_V2.md §7).

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: ursus-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ursus
      CLICKHOUSE_USER: ursus
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-ursus-secret}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ../server/migrations/clickhouse:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      engine:
        condition: service_healthy
    environment:
      URSUS_STORAGE: clickhouse
      CLICKHOUSE_DSN: "clickhouse://ursus:${CLICKHOUSE_PASSWORD:-ursus-secret}@clickhouse:9000/ursus"
      DATABASE_URL: "postgres://logvault:logvault-secret@postgres:5432/logvault"

volumes:
  clickhouse_data:
