version: "3.9"

# URSUS SIEM — production docker-compose (Micro tier).
#
# Run from the repo root:
#   docker compose -f deploy/docker-compose.yml up -d
#
# Or from this directory:
#   cd deploy && docker compose up -d
#
# Paths in `build.context` are RELATIVE to this file
# (so they walk up one level to ../server/...).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: logvault
      POSTGRES_PASSWORD: logvault-secret
      POSTGRES_DB: logvault
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../server/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logvault"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ../server/engine
    container_name: ursus-engine
    restart: unless-stopped
    environment:
      ENGINE_ADDR: "0.0.0.0:8001"
      RUST_LOG: "info"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  gateway:
    build:
      context: ../server/gateway
    container_name: ursus-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      engine:
        condition: service_healthy
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://logvault:logvault-secret@postgres:5432/logvault"
      JWT_SECRET: "${JWT_SECRET:-logvault-jwt-secret-change-in-production}"
      TOKEN_TTL_HOURS: "8"
      API_KEYS: "${API_KEYS:-changeme-agent-key}"
      ENGINE_URL: "http://engine:8001"
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      MAX_BATCH_SIZE: "5000"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD_HASH: "${ADMIN_PASSWORD_HASH}"
      # Built-in syslog listener for network devices (RFC 5424 + RFC 3164).
      # Leave empty to disable.
      URSUS_SYSLOG_UDP: "${URSUS_SYSLOG_UDP:-:514}"
      URSUS_SYSLOG_TCP: "${URSUS_SYSLOG_TCP:-:514}"
      # Bundled scenarios + sigma rules (mounted below).
      URSUS_SCENARIOS_DIR: /etc/ursus/scenarios
    volumes:
      - ../server/configs/scenarios:/etc/ursus/scenarios:ro
      - ../server/configs/sigma_rules:/etc/ursus/sigma_rules:ro
      - ../server/configs/compliance:/etc/ursus/compliance:ro
    ports:
      - "8080:8080"
      # Syslog ingestion. Bind only if not occupied on host.
      - "514:514/udp"
      - "514:514/tcp"

  # Dev-only Vite server with hot reload — `--profile dev`.
  ui-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../server/ui:/app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: "http://localhost:8080"
    ports:
      - "5173:5173"
    profiles:
      - dev

  # Production frontend: build the React app once, serve via Caddy.
  ui:
    build:
      context: ../server/ui
    container_name: ursus-ui
    restart: unless-stopped
    networks:
      default:
        aliases:
          - ui

  caddy:
    image: caddy:2-alpine
    container_name: ursus-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ui
      - gateway

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
