server {
    listen 80;
    server_name _;

    # API proxy - must come before static files
    location /api/ {
        proxy_pass http://logvault-go:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://logvault-go:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static JS/CSS assets (Vite build output) — serve as files only, no directory fallback
    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — all app routes fall through to index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }

    error_page 405 =200 $uri;
}
