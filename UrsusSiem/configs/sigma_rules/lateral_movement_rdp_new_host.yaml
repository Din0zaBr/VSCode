title: RDP Login from New or Unusual Source Host
id: lm-rdp-001
status: stable
description: Detects successful RDP logins (Event 4624, LogonType 10) from source hosts that have not previously connected to this destination, potentially indicating lateral movement.
author: URSUS SIEM
date: 2024-01-01
category: lateral_movement
severity: high
tags:
  - attack.lateral_movement
  - attack.t1021.001
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 10
    message|contains: "RemoteInteractive"
  filter_known:
    src.ip|startswith:
      - "10."
      - "192.168."
      - "172.16."
  condition: selection and not filter_known
fields:
  - src.ip
  - subject.name
  - host
  - message
falsepositives:
  - Legitimate remote administration from new workstations
  - IT helpdesk connecting to user machines
level: high
