<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#16162A;padding:24px;display:flex;flex-direction:column;gap:12px}
.label{font-family:'Share Tech Mono',monospace;font-size:9px;color:#BF40BF;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.divider{height:1px;background:#2A2A4A}
</style>
</head>
<body>
<div>
  <div class="label">panel title</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#BF40BF;letter-spacing:2px;text-transform:uppercase">◈ ЖУРНАЛ СОБЫТИЙ</div>
</div>
<div class="divider"></div>
<div>
  <div class="label">table header</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#9A9ABE;letter-spacing:1.5px;text-transform:uppercase">SEVERITY · КАТЕГОРИЯ · ИСТОЧНИК · СООБЩЕНИЕ</div>
</div>
<div class="divider"></div>
<div>
  <div class="label">timestamp</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#D4D4E8">01.05.2026, 14:32:07</div>
</div>
<div class="divider"></div>
<div>
  <div class="label">clock display</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:16px;color:#BF40BF;letter-spacing:2px;font-weight:bold;text-shadow:0 0 8px rgba(191,64,191,0.5)">14:32:07</div>
</div>
<div class="divider"></div>
<div>
  <div class="label">raw log / code</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#D4D4E8;background:#1E1E36;border:1px solid #2A2A4A;border-radius:3px;padding:8px;line-height:1.6">May  1 14:32:07 srv01 sshd[1234]: Failed password for root from 192.168.1.42 port 22 ssh2</div>
</div>
<div class="divider"></div>
<div>
  <div class="label">version tag</div>
  <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#9A9ABE;letter-spacing:1px">v1.0.0 // PROTOTYPE // CYBER FOREST</div>
</div>
</body>
</html>
