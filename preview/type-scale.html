<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0D0D1A;padding:20px;display:flex;flex-direction:column;gap:0}
.row{display:flex;align-items:baseline;gap:14px;padding:7px 0;border-bottom:1px solid #2A2A4A}
.size{font-family:'Share Tech Mono',monospace;font-size:9px;color:#7A7A9A;width:50px;flex-shrink:0}
.token{font-family:'Share Tech Mono',monospace;font-size:9px;color:#6A0DAD;width:90px;flex-shrink:0}
</style>
</head>
<body>
<div class="row">
  <span class="size">36px</span><span class="token">--text-3xl</span>
  <span style="font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:#BF40BF;letter-spacing:4px">URSUS</span>
</div>
<div class="row">
  <span class="size">28px</span><span class="token">--text-2xl</span>
  <span style="font-family:'Orbitron',monospace;font-size:28px;font-weight:700;color:#EEEEFF">1,247</span>
</div>
<div class="row">
  <span class="size">24px</span><span class="token">--text-xl</span>
  <span style="font-family:'Orbitron',monospace;font-size:24px;font-weight:700;color:#EEEEFF;letter-spacing:2px">DASHBOARD</span>
</div>
<div class="row">
  <span class="size">18px</span><span class="token">--text-lg</span>
  <span style="font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#BF40BF;letter-spacing:3px">URSUS</span>
</div>
<div class="row">
  <span class="size">16px</span><span class="token">--text-md</span>
  <span style="font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:#EEEEFF">Система активна</span>
</div>
<div class="row">
  <span class="size">14px</span><span class="token">--text-base</span>
  <span style="font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:500;color:#D4D4E8">Управление инцидентами безопасности</span>
</div>
<div class="row">
  <span class="size">11px</span><span class="token">--text-sm</span>
  <span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#D4D4E8">◈ ЖУРНАЛ СОБЫТИЙ</span>
</div>
<div class="row">
  <span class="size">10px</span><span class="token">--text-xs</span>
  <span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#7A7A9A;letter-spacing:1.5px;text-transform:uppercase">SEVERITY · TIMESTAMP · SOURCE</span>
</div>
</body>
</html>
