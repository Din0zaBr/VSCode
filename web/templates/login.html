<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вход — Ursus Insight SIEM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary:   #6A0DAD;
      --accent:    #BF40BF;
      --bg:        #2F4F4F;
      --bg-dark:   #1a2e2e;
      --bg-panel:  #223333;
      --border:    #3d6060;
      --text:      #e0f0f0;
      --text-dim:  #7fa8a8;
      --danger:    #FF3131;
      --font-mono: 'Share Tech Mono', monospace;
      --font-ui:   'Rajdhani', sans-serif;
      --font-head: 'Orbitron', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Cyber grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(106,13,173,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(106,13,173,.08) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.15) 2px,
        rgba(0,0,0,.15) 4px
      );
      pointer-events: none;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .logo-block {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-bear {
      font-size: 56px;
      filter: drop-shadow(0 0 20px var(--accent));
      animation: bear-pulse 3s ease-in-out infinite;
      display: block;
      margin-bottom: 10px;
    }

    @keyframes bear-pulse {
      0%, 100% { filter: drop-shadow(0 0 16px var(--accent)); }
      50%       { filter: drop-shadow(0 0 32px var(--primary)); }
    }

    .logo-name {
      display: block;
      font-family: var(--font-head);
      font-size: 28px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 6px;
      text-shadow: 0 0 20px rgba(191,64,191,.5);
    }

    .logo-sub {
      display: block;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 4px;
      margin-top: 4px;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 0 40px rgba(106,13,173,.2), inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-header::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--accent);
    }

    .panel-body {
      padding: 28px 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      background: var(--bg-dark);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(106,13,173,.25);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border: none;
      border-radius: 3px;
      color: #fff;
      font-family: var(--font-head);
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: opacity .2s, box-shadow .2s;
      box-shadow: 0 0 20px rgba(191,64,191,.3);
    }

    .btn-login:hover {
      opacity: .9;
      box-shadow: 0 0 30px rgba(191,64,191,.5);
    }

    .error-msg {
      background: rgba(255,49,49,.1);
      border: 1px solid var(--danger);
      border-radius: 3px;
      color: var(--danger);
      font-family: var(--font-mono);
      font-size: 12px;
      padding: 10px 14px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-note {
      text-align: center;
      margin-top: 20px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-block">
      <span class="logo-bear">🐻</span>
      <span class="logo-name">URSUS INSIGHT</span>
      <span class="logo-sub">SECURITY INFORMATION &amp; EVENT MANAGEMENT</span>
    </div>

    <div class="panel">
      <div class="panel-header">АУТЕНТИФИКАЦИЯ</div>
      <div class="panel-body">
        {% if error %}
        <div class="error-msg">⚠ {{ error }}</div>
        {% endif %}

        <form method="post">
          <div class="form-group">
            <label class="form-label" for="username">ПОЛЬЗОВАТЕЛЬ</label>
            <input class="input" type="text" id="username" name="username"
                   autocomplete="username" autofocus
                   placeholder="admin"/>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">ПАРОЛЬ</label>
            <input class="input" type="password" id="password" name="password"
                   autocomplete="current-password"
                   placeholder="••••••••"/>
          </div>
          <button class="btn-login" type="submit">ВОЙТИ</button>
        </form>
      </div>
    </div>

    <div class="footer-note">CYBER FOREST // v1.0.0 // PROTOTYPE</div>
  </div>
</body>
</html>
